<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0818">
<title>Pranjal & Fareeza 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#ff6b9d;--soft-pink:#ffc2d9;--dark:#0e0818;--mid:#1e1230;
  --accent:#e40026;--gold:#ffd700;--text:#fff5f8;--green:#4ade80;
}
body{
  background:
    radial-gradient(circle at top, rgba(255,107,157,.18), transparent 30%),
    radial-gradient(circle at bottom, rgba(255,215,0,.10), transparent 28%),
    var(--dark);
  color:var(--text);
  font-family:'Press Start 2P',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
  padding-bottom:24px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 38%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 8%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 78% 55%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 43% 78%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 28%,#fff 0%,transparent 100%),
    radial-gradient(2px 2px at 33% 52%,rgba(255,180,210,.7) 0%,transparent 100%),
    radial-gradient(2px 2px at 65% 85%,rgba(255,180,210,.7) 0%,transparent 100%);
}

/* ── SCREENS ── */
.screen{position:relative;z-index:1;width:100%;max-width:520px;padding:16px;display:none;flex-direction:column;gap:14px;animation:fadeIn .4s ease;}
.screen.active{display:flex;}
@media (max-width:520px){
  .screen{padding:12px;}
  h1{line-height:2.4;}
  .btn{font-size:8px;}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── TITLE ── */
#s-title{align-items:center;text-align:center;padding-top:40px;}
.title-emoji{font-size:36px;animation:float 2.4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-size:clamp(11px,3vw,16px);color:var(--pink);line-height:2.2;text-shadow:3px 3px 0 #6b0030;}
.tagline{font-family:'VT323',monospace;font-size:20px;color:var(--soft-pink);}
.divider{width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:4px 0;}

/* ── BUTTONS ── */
.btn{
  font-family:'Press Start 2P',monospace;font-size:9px;padding:13px 18px;
  border:3px solid var(--pink);background:var(--mid);color:var(--text);
  cursor:pointer;box-shadow:4px 4px 0 #6b0030;transition:all .08s;
  line-height:1.6;text-align:center;
}
.btn:hover,.btn:focus{background:var(--pink);color:var(--dark);transform:translate(-2px,-2px);box-shadow:6px 6px 0 #6b0030;outline:none;}
.btn:active{transform:translate(1px,1px);box-shadow:2px 2px 0 #6b0030;}
.btn.gold{border-color:var(--gold);box-shadow:4px 4px 0 #7a6000;}
.btn.gold:hover{background:var(--gold);color:var(--dark);box-shadow:6px 6px 0 #7a6000;}
.btn.red{border-color:var(--accent);box-shadow:4px 4px 0 #700010;}
.btn.red:hover{background:var(--accent);box-shadow:6px 6px 0 #700010;}
.btn.sm{font-size:7px;padding:8px 12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
@keyframes pulse{0%,100%{box-shadow:4px 4px 0 #6b0030}50%{box-shadow:4px 4px 14px #ff6b9d88}}
.btn.pulse{animation:pulse 1.5s ease-in-out infinite;}

/* ── INPUT ── */
.field-label{font-size:7px;color:var(--soft-pink);margin-bottom:4px;}
input[type=text]{
  font-family:'VT323',monospace;font-size:20px;
  background:var(--mid);border:2px solid var(--soft-pink);
  color:var(--text);padding:10px 12px;width:100%;outline:none;
}
input[type=text]:focus{border-color:var(--pink);}
input[type=text]::placeholder{color:#6b4a6b;}

/* ── PANEL ── */
.panel{background:rgba(30,18,48,.95);border:3px solid var(--pink);padding:14px;box-shadow:4px 4px 0 #6b0030;border-radius:16px;backdrop-filter:blur(8px);}
.panel-title{font-size:8px;color:var(--gold);margin-bottom:10px;}

/* ── ROOM SCREEN ── */
.room-code-display{
  font-family:'VT323',monospace;font-size:48px;color:var(--gold);
  text-align:center;letter-spacing:8px;text-shadow:3px 3px 0 #7a6000;
  padding:12px 0;
}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.dot-waiting{background:#888;animation:dotBlink 1s step-end infinite;}
.dot-online{background:var(--green);}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
.player-list{display:flex;flex-direction:column;gap:6px;}
.player-row{font-family:'VT323',monospace;font-size:18px;display:flex;align-items:center;gap:8px;}

/* ── SCENE ── */
#scene-canvas{width:100%;height:180px;display:block;image-rendering:pixelated;border:3px solid var(--pink);box-shadow:4px 4px 0 #6b0030;border-radius:14px;background:#05050a;position:relative;overflow:hidden;}
.loc-banner{background:linear-gradient(90deg, rgba(30,18,48,.95), rgba(70,24,55,.95));border:3px solid var(--pink);padding:8px 12px;font-family:'VT323',monospace;font-size:20px;color:var(--gold);text-align:center;box-shadow:4px 4px 0 #6b0030;border-radius:14px;transition:transform .25s ease, box-shadow .25s ease;}
.loc-banner.romance-pulse{animation:bannerPulse .9s ease-in-out 2;}
@keyframes bannerPulse{0%,100%{transform:scale(1);box-shadow:4px 4px 0 #6b0030}50%{transform:scale(1.02);box-shadow:0 0 26px rgba(255,107,157,.42)}}

/* ── ROMANCE FX ── */
.romance-fx{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;}
.fx-pop{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-family:'VT323',monospace;font-size:24px;color:var(--gold);text-shadow:2px 2px 0 #120714;animation:fxPop 1.2s ease-out forwards;}
@keyframes fxPop{0%{opacity:0;transform:translate(-50%,-20%) scale(.7)}12%{opacity:1}100%{opacity:0;transform:translate(-50%,-120%) scale(1.6)}}
.kiss-ring{position:absolute;left:50%;top:42%;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,182,193,.95);transform:translate(-50%,-50%);animation:kissRing 1s ease-out forwards;}
@keyframes kissRing{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}15%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(16)}}
.sparkle{position:absolute;font-size:18px;animation:sparkleFly 1.4s ease-out forwards;filter:drop-shadow(0 0 8px rgba(255,215,0,.45));}
@keyframes sparkleFly{0%{opacity:0;transform:translateY(16px) scale(.6)}15%{opacity:1}100%{opacity:0;transform:translateY(-160px) scale(1.5)}}
.love-cloud{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);font-family:'VT323',monospace;font-size:28px;color:#ffd1e0;text-shadow:0 0 10px rgba(255,107,157,.55);animation:loveCloud 1.7s ease-out forwards;}
@keyframes loveCloud{0%{opacity:0;transform:translate(-50%,10%) scale(.75)}12%{opacity:1}100%{opacity:0;transform:translate(-50%,-120%) scale(1.85)}}
.scene-dust{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, rgba(255,107,157,.08), transparent 45%);mix-blend-mode:screen;pointer-events:none;}

/* ── CHAT ── */
/* ── CHAT ── */
#chat-area{
  height:240px;overflow-y:auto;background:linear-gradient(180deg,#100917,#0b0712);
  border:3px solid var(--soft-pink);padding:10px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;
  border-radius:14px;
}
#chat-area::-webkit-scrollbar{width:4px;}
#chat-area::-webkit-scrollbar-thumb{background:var(--pink);}
.msg{display:flex;flex-direction:column;gap:3px;max-width:88%;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.msg.them{align-self:flex-start;align-items:flex-start;}
.msg.system{align-self:center;align-items:center;max-width:100%;}
.msg-name{font-size:6px;color:var(--soft-pink);}
.msg.me .msg-name{color:var(--gold);}
.msg-bubble{
  font-family:'VT323',monospace;font-size:18px;
  padding:8px 12px;line-height:1.4;word-break:break-word;
}
.msg.me .msg-bubble{background:var(--pink);color:var(--dark);}
.msg.them .msg-bubble{background:var(--mid);border:2px solid var(--soft-pink);color:var(--text);}
.msg.system .msg-bubble{background:transparent;color:#888;font-size:14px;border:none;text-align:center;}
.msg.action-msg .msg-bubble{background:#2a1a3e;border:2px solid var(--gold);color:var(--gold);}
.msg.action-msg{align-self:center;align-items:center;max-width:100%;}
.typing-indicator{font-family:'VT323',monospace;font-size:16px;color:#888;padding:4px 10px;display:none;}
.typing-indicator.visible{display:block;}

/* ── CHAT INPUT ── */
.chat-input-row{display:flex;gap:6px;}
#chat-input{flex:1;font-family:'VT323',monospace;font-size:20px;background:var(--mid);border:2px solid var(--soft-pink);color:var(--text);padding:10px 12px;outline:none;}
#chat-input:focus{border-color:var(--pink);}
#send-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 12px;border:2px solid var(--pink);background:var(--pink);color:var(--dark);cursor:pointer;}
#send-btn:hover{background:var(--soft-pink);}

/* ── ACTIONS GRID ── */
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.date-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
#hug-btn,#kiss-btn,#love-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px;border:3px solid var(--soft-pink);background:var(--mid);color:var(--soft-pink);cursor:pointer;box-shadow:3px 3px 0 #6b0030;transition:transform .08s ease, box-shadow .08s ease, background .12s ease;}
#hug-btn:hover,#kiss-btn:hover,#love-btn:hover{background:var(--soft-pink);color:var(--dark);transform:translate(-1px,-1px);}
#kiss-btn{border-color:#ff9ec0;color:#ffd4e1;}
#love-btn{border-color:var(--gold);color:#ffeab0;}

/* ── LOC PICKER ── */
.loc-grid{display:flex;flex-direction:column;gap:8px;}
.loc-btn{
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:12px 10px;border:2px solid var(--soft-pink);
  background:var(--mid);color:var(--text);cursor:pointer;
  text-align:left;line-height:1.8;box-shadow:3px 3px 0 #6b0030;
}
.loc-btn:hover{border-color:var(--gold);background:#2d1b4e;transform:translate(-2px,-2px);box-shadow:5px 5px 0 #6b0030;}

/* ── LOVE BAR ── */
.love-bar-wrap{display:flex;align-items:center;gap:8px;font-family:'VT323',monospace;font-size:18px;}
.love-bar-outer{flex:1;background:#0e0818;border:2px solid var(--pink);height:14px;}
.love-bar-inner{height:100%;background:linear-gradient(90deg,#ff6b9d,#ff3878);transition:width .5s;}
.love-count{color:var(--gold);min-width:48px;}

.dream-entry{display:flex;justify-content:center;margin-top:2px;}
#dream-btn{
  width:100%;
  font-family:'Press Start 2P',monospace;
  font-size:8px;
  padding:12px 14px;
  border:3px solid var(--gold);
  background:linear-gradient(90deg, rgba(30,18,48,.95), rgba(70,24,55,.95));
  color:#ffe7b2;
  box-shadow:4px 4px 0 #7a6000;
  cursor:pointer;
  display:none;
}
#dream-btn:hover{background:linear-gradient(90deg, #ffd95b, #ffb84d); color:var(--dark); transform:translate(-1px,-1px);}
.dream-note{font-family:'VT323',monospace;font-size:18px;color:#d9b7ff;text-align:center;letter-spacing:.5px;}
.scene-caption{
  font-family:'VT323',monospace;
  font-size:20px;
  text-align:center;
  color:#ffd9e7;
  min-height:24px;
  text-shadow:0 0 10px rgba(255,107,157,.18);
}

/* ── HUG BTN ── */
#hug-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:10px;border:3px solid var(--soft-pink);
  background:var(--mid);color:var(--soft-pink);cursor:pointer;
  box-shadow:3px 3px 0 #6b0030;
}
#hug-btn:hover{background:var(--soft-pink);color:var(--dark);}

/* ── PARTICLES ── */
.heart-pop{position:fixed;pointer-events:none;font-size:22px;animation:heartFly 1.3s ease-out forwards;z-index:999;}
@keyframes heartFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-130px) scale(2)}}
.stat-flash{position:fixed;pointer-events:none;font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold);text-shadow:2px 2px 0 var(--dark);animation:statFly 1s ease-out forwards;z-index:999;}
@keyframes statFly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* ── ERROR / TOAST ── */
.toast{border-radius:999px;
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'VT323',monospace;font-size:18px;
  background:var(--mid);border:2px solid var(--pink);
  color:var(--text);padding:10px 20px;z-index:999;
  animation:toastIn .3s ease;display:none;
}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
<script>
// ── IMMEDIATE STUBS ─────────────────────────────────────────────
// Define showScreen right away (no Firebase needed).
// All other functions are set to safe no-ops that show a loading message;
// the ES module overwrites them with real implementations once Firebase loads.
window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
};
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
};
const _loading = (name) => () => window.showToast('loading... please wait a moment 💕');
window.setRole      = _loading('setRole');
window.createRoom   = _loading('createRoom');
window.joinRoom     = _loading('joinRoom');
window.startDate    = _loading('startDate');
window.copyCode     = _loading('copyCode');
window.pickLocation = _loading('pickLocation');
window.enterDream   = _loading('enterDream');
window.sendMessage  = _loading('sendMessage');
window.sendHug      = _loading('sendHug');
window.sendKiss     = _loading('sendKiss');
window.sendLoveYou  = _loading('sendLoveYou');
window.leaveRoom    = _loading('leaveRoom');
window.onTyping     = () => {};
</script>

<!-- ══ LOCATION PICK ══ -->

<!-- ══ GAME SCREEN ══ -->
<div class="screen" id="s-game">

  return role === 'PRANJAL' ? 'Pranjal' : role === 'FAREEZA' ? 'Fareeza' : String(role || '').toLowerCase();
}

function saveSession() {
  try {
    if (myRole) localStorage.setItem(STORAGE_ROLE, myRole);
    if (roomCode) localStorage.setItem(STORAGE_ROOM, roomCode);
  } catch (_) {}
}

function loadSession() {
  try {
    const savedRole = localStorage.getItem(STORAGE_ROLE);
    const savedRoom = localStorage.getItem(STORAGE_ROOM);
    if (savedRole) {
      myRole = savedRole;
      document.getElementById('room-panel').style.display = 'block';
      document.getElementById('room-panel-title').textContent = `HEY ${savedRole}! CREATE OR JOIN?`;
      // Skip past title/who-are-you screen automatically
      showScreen('s-join');
    }
    if (savedRoom) {
      const input = document.getElementById('join-code-input');
      if (input) input.value = savedRoom;
      // Auto-rejoin the saved room
      if (savedRole) {
        (async () => {
          try {
            const snap = await get(ref(db, `rooms/${savedRoom}`));
            if (snap.exists()) {
              roomCode = savedRoom;
              roomRef = ref(db, `rooms/${roomCode}`);
              await update(ref(db, `rooms/${roomCode}/players`), { [myRole]: true });
              enterLobby();
              // If game was already started, jump straight back in
              const started = snap.val()?.started;
              if (started === true) {
                showScreen('s-game');
                listenGameState();
              }
            } else {
              // Room no longer exists; clear saved code
              try { localStorage.removeItem(STORAGE_ROOM); } catch (_) {}
              if (input) input.value = '';
            }
          } catch (_) {}
        })();
      }
    }
  } catch (_) {}
}

function clearRoomListeners() {
  roomUnsubs.forEach(fn => {
    try { fn(); } catch (_) {}
  });
  roomUnsubs = [];
}

function trackListener(unsub) {
  if (typeof unsub === 'function') roomUnsubs.push(unsub);
  return unsub;
}

function clearTyping() {
  if (!roomCode || !myRole) return;
  update(ref(db, `rooms/${roomCode}/typing`), { [myRole]: false }).catch(() => {});
}

function systemMessage(text) {
  push(ref(db, `rooms/${roomCode}/messages`), {

    type: 'system',
    ts: serverTimestamp()
  }).catch(() => {});
}

// ── ROOM CODE GEN ──────────────────────────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function normalizeCode(code) {
  return String(code || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
}

// ── CREATE ROOM ────────────────────────────────────────────────
window.createRoom = async () => {
  if (!myRole) { showToast('pick who you are first!'); return; }
  try {
    showToast('creating room...', 1500);
    let attempts = 0;
    while (attempts < 8) {
      const candidate = genCode();
      const existing = await get(ref(db, `rooms/${candidate}`));
      if (!existing.exists()) {
        roomCode = candidate;
        break;
      }
      attempts++;
    }
    if (!roomCode) { showToast('could not mint a room code'); return; }
    roomRef = ref(db, `rooms/${roomCode}`);
    await set(roomRef, {
      createdAt: serverTimestamp(),
      players: { [myRole]: true },
      hearts: 2,
      location: null,
      started: false
    });
    systemMessage(`${displayName(myRole)} created the room ✨`);
    saveSession();
    enterLobby();
  } catch(e) {
    showToast('error: ' + e.message, 4000);
    console.error(e);
  }
};

// ── JOIN ROOM ──────────────────────────────────────────────────
window.joinRoom = async () => {
  if (!myRole) { showToast('pick who you are first!'); return; }
  const code = normalizeCode(document.getElementById('join-code-input').value);
  document.getElementById('join-code-input').value = code;
  if (code.length !== 6) { showToast('enter a valid 6-letter code!'); return; }
  try {
    showToast('joining room...', 1500);
    const snap = await get(ref(db, `rooms/${code}`));
    if (!snap.exists()) { showToast('room not found 😭'); return; }
    roomCode = code;
    roomRef = ref(db, `rooms/${roomCode}`);
    await update(ref(db, `rooms/${roomCode}/players`), { [myRole]: true });
    systemMessage(`${displayName(myRole)} joined the room 💞`);
    saveSession();
    enterLobby();
  } catch(e) {
    showToast('error: ' + e.message, 4000);
    console.error(e);
  }
};

function enterLobby() {
  clearRoomListeners();
  document.getElementById('lobby-code').textContent = roomCode;
  showScreen('s-lobby');

  trackListener(onValue(ref(db, `rooms/${roomCode}/players`), snap => {
    const players = snap.val() || {};
    const list = document.getElementById('player-list');
    list.innerHTML = '';
    ['PRANJAL','FAREEZA'].forEach(name => {
      const row = document.createElement('div');
      row.className = 'player-row';
      const dot = document.createElement('span');
      dot.className = 'status-dot ' + (players[name] ? 'dot-online' : 'dot-waiting');
      const label = document.createElement('span');
      label.style.fontFamily = 'VT323,monospace';
      label.style.fontSize = '20px';
      label.textContent = players[name]
        ? `👋 ${displayName(name)} — online`
        : `⌛ ${displayName(name)} — waiting...`;
      row.appendChild(dot); row.appendChild(label);
      list.appendChild(row);
    });
    const both = players.PRANJAL && players.FAREEZA;
    document.getElementById('start-date-btn').style.display = both ? 'block' : 'none';

  trackListener(onValue(ref(db, `rooms/${roomCode}/started`), snap => {

let sceneLoopId = null;
let sceneMotion = null;
function startSceneLoop() {
  if (sceneLoopId) return;
  const tick = (t) => {

      sceneLoopId = null;
      return;

    drawScene(currentLoc, t);
    sceneLoopId = requestAnimationFrame(tick);
  };
  sceneLoopId = requestAnimationFrame(tick);
}

function stopSceneLoop() {

}

function startDreamLoop() {

  const tick = (t) => {
    if (currentLoc !== 'dream' || !document.getElementById('s-game').classList.contains('active')) {
      stopDreamLoop();
      return;
    }
    drawScene('dream', t);
    dreamLoopId = requestAnimationFrame(tick);

}

function listenGameState() {
  clearRoomListeners();

  // Hearts
  trackListener(onValue(ref(db, `rooms/${roomCode}/hearts`), snap => {
    hearts = snap.val() || 2;
    updateHeartsBar();
  }));

  // Location changes
  trackListener(onValue(ref(db, `rooms/${roomCode}/location`), snap => {
    const loc = snap.val();
    if (loc && loc !== currentLoc) goToLocation(loc);
  }));

  // Chat messages
  lastMsgKey = null;
  const messagesRef = ref(db, `rooms/${roomCode}/messages`);
  trackListener(onChildAdded(messagesRef, snap => {
    const msg = snap.val();
    if (!msg) return;
    appendMessage(msg);
  }));

  // Typing
  trackListener(onValue(ref(db, `rooms/${roomCode}/typing`), snap => {
    const typing = snap.val() || {};
    const others = Object.entries(typing).filter(([k,v]) => k !== myRole && v);
    const ind = document.getElementById('typing-indicator');
    const nameEl = document.getElementById('typing-name');
    if (others.length) {
      nameEl.textContent = displayName(others[0][0]);
      ind.classList.add('visible');
    } else {
      ind.classList.remove('visible');
    }
  }));
}

    music: { emojis: ['💜','🎧','✨','🎵','🌙'], center: '💜 concert glow!', burst: 16, note: 'Tiny concert. Massive feelings.', centerClass: 'fx-pop' },
    dream: { emojis: ['🌙','🌼','✨','💞','🕊️'], center: '🌙 dream shimmer!', burst: 18, note: 'The dream is awake.', centerClass: 'love-cloud' },
    spark: { emojis: ['✨','💖','💫','💗','🎀'], center: '✨ sparkle!', burst: 10, note: 'A little extra gravity. That is all.', centerClass: 'fx-pop' },
  };

  const preset = presets[kind] || presets.spark;
  const center = document.createElement('div');
  center.className = preset.centerClass;
  center.textContent = preset.center;
  layer.appendChild(center);

  if (kind === 'kiss' || kind === 'love') {
    const ring = document.createElement('div');
    ring.className = 'kiss-ring';
    if (kind === 'love') ring.style.borderColor = 'rgba(255,215,160,.72)';
    layer.appendChild(ring);
  }

  const bouquet = kind === 'love' || kind === 'dream' ? 'petal' : kind === 'music' ? 'duo-spark' : 'heart-pop';
  for (let i = 0; i < preset.burst; i++) {
    const el = document.createElement('div');
    el.className = bouquet;
    el.textContent = preset.emojis[i % preset.emojis.length];
    el.style.left = (34 + Math.random() * 32) + '%';
    el.style.top = (34 + Math.random() * 20) + '%';
    el.style.fontSize = (kind === 'love' || kind === 'dream') ? (16 + Math.random() * 12) + 'px' : (17 + Math.random() * 14) + 'px';
    el.style.animationDelay = (i * 26) + 'ms';
    layer.appendChild(el);
    setTimeout(() => el.remove(), (kind === 'love' || kind === 'dream') ? 1750 : 1450);
  }

  if (kind === 'hug' || kind === 'kiss') {
    const duo = document.createElement('div');
    duo.className = 'tiny-bubble';
    duo.textContent = kind === 'hug' ? '🫶' : '😘';
    duo.style.cssText = "position:absolute;left:50%;top:52%;transform:translateX(-50%);font-size:42px;";
    layer.appendChild(duo);
    setTimeout(() => duo.remove(), 1200);
  }

  if (kind === 'music') {
    for (let i = 0; i < 4; i++) {
      const note = document.createElement('div');
      note.className = 'tiny-bubble';
      note.textContent = ['🎵','🎶','💜','🎧'][i];
      note.style.left = (42 + i * 10) + '%';
      note.style.top = (48 + (i % 2) * 8) + '%';
      note.style.fontSize = '22px';
      layer.appendChild(note);
      setTimeout(() => note.remove(), 1500);
    }
  }

  const note = document.createElement('div');
  note.className = 'love-note';
  note.textContent = preset.note + (text && text.length > 52 ? ' ✨' : '');
  note.style.cssText = "position:absolute;left:50%;top:61%;transform:translateX(-50%);font-family:'VT323',monospace;font-size:24px;color:#ffd9e6;text-shadow:0 0 12px rgba(255,107,157,.4);animation:loveCloud 1.7s ease-out forwards;";
  layer.appendChild(note);
  setTimeout(() => note.remove(), 1800);

  setTimeout(() => { layer.innerHTML = ''; }, 1800);
}

function px(ctx, x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

function drawScene(loc, now = performance.now()) {
  const canvas = document.getElementById('scene-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const scenes = {
    golgappe: drawGolgappe,
    momos: drawMomos,
    bts: drawBTS,
    f1: drawF1,
    train: drawTrain,
    stars: drawStarsScene,
    iit: drawIIT,
    dream: drawDream
  };
  (scenes[loc] || drawGolgappe)(ctx, W, H, now);
}


// ── OVERRIDES: richer choreography + safer dream ─────────────
function playSceneMotion(kind = 'spark', duration = 1200, meta = {}) {
  sceneMotion = {
    kind,
    start: performance.now(),
    duration: Math.max(420, duration || 0),
    meta
  };
}

function motionProgress(now = performance.now()) {
  if (!sceneMotion) return 1;
  return clamp01((now - sceneMotion.start) / Math.max(sceneMotion.duration, 1));
}

function motionPhase(now = performance.now(), stops = [0.42, 0.72]) {
  const p = motionProgress(now);
  if (p < stops[0]) return 0;
  if (p < stops[1]) return 1;
  return 2;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function softPulse(now, rate = 260) {
  return 0.5 + 0.5 * Math.sin(now / rate);
}

function drawParticleCloud(ctx, now, count, x0, y0, spread, glyphs, color, size = 14) {
  for (let i = 0; i < count; i++) {
    const t = now / 320 + i * 0.8;
    const x = x0 + Math.cos(t) * spread * 0.45 + Math.sin(t * 1.7) * spread * 0.12;
    const y = y0 + Math.sin(t * 0.9) * spread * 0.18 - (i * 2);
    ctx.fillStyle = color;
    ctx.font = `${size}px monospace`;
    ctx.fillText(glyphs[i % glyphs.length], x, y);
  }
}


function clamp01(v) {
  return Math.max(0, Math.min(1, Number.isFinite(v) ? v : 0));
}

function easeInOutCubic(t) {
  t = clamp01(t);
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function sceneText(ctx, text, x, y, color = '#fff', size = 10) {
  if (!ctx) return;
  ctx.save();
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px monospace`;
  ctx.fillText(String(text), x, y);
  ctx.restore();
}

function floatingNotes(ctx, now, x, y, count = 4, color = 'rgba(255,255,255,.8)') {
  const glyphs = ['♪', '♫', '♬', '•'];
  for (let i = 0; i < count; i++) {
    const t = now / 180 + i * 0.7;
    const dx = Math.cos(t) * 12 + Math.sin(t * 1.8) * 4;
    const dy = Math.sin(t * 0.9) * 10 - i * 2;
    ctx.fillStyle = color;
    ctx.font = `${10 + (i % 2) * 2}px monospace`;
    ctx.fillText(glyphs[i % glyphs.length], x + dx, y + dy);
  }
}

function floatingHearts(ctx, now, count = 6, x = 224, y = 72, spread = 36, glyphs = ['💗', '💕', '💖']) {
  for (let i = 0; i < count; i++) {
    const t = now / 240 + i * 0.8;
    const dx = Math.cos(t) * spread * 0.35 + Math.sin(t * 1.3) * 5;
    const dy = Math.sin(t * 0.9) * spread * 0.22 - i * 2;
    ctx.font = `${12 + (i % 3) * 2}px monospace`;
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ctx.fillText(glyphs[i % glyphs.length], x + dx, y + dy);
  }
}

function steamPuffs(ctx, now, x, y, color = 'rgba(255,230,205,.72)') {
  for (let i = 0; i < 5; i++) {
    const t = now / 260 + i * 0.9;
    const dx = Math.sin(t) * 10 + (i - 2) * 12;
    const dy = -Math.abs(Math.cos(t)) * 18 - i * 8;
    const r = 7 + (i % 3) * 2 + Math.sin(now / 120 + i) * 1.2;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x + dx, y + dy, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function petalFalling(ctx, now, count = 5, x = 224, y = 80, spreadX = 50, spreadY = 30, color = 'rgba(255,182,193,.5)') {
  const petals = ['✿', '❀', '🌸', '•'];
  for (let i = 0; i < count; i++) {
    const t = now / 320 + i * 0.6;
    const dx = Math.sin(t * 0.8) * spreadX * 0.5 + (i - count / 2) * 7;
    const dy = Math.cos(t * 1.1) * spreadY * 0.25 + (i * 2) - 6;
    ctx.fillStyle = color;
    ctx.font = `${10 + (i % 3) * 2}px monospace`;
    ctx.fillText(petals[i % petals.length], x + dx, y + dy);
  }
}

function drawChibiDuo(ctx, now, mode = 'steam', opts = {}) {
  const center = opts.center ?? 224;
  const leftStart = opts.leftStart ?? 84;
  const rightStart = opts.rightStart ?? 364;
  const leftY = opts.leftY ?? 92;
  const rightY = opts.rightY ?? 92;
  const closeGap = opts.closeGap ?? 42;
  const p = clamp01((now - (sceneMotion?.start || now)) / Math.max(sceneMotion?.duration || 1200, 1));
  const approach = mode === 'kiss' ? 1 : mode === 'hug' ? 0.8 : mode === 'love' ? 0.65 : 0.45;
  const leftX = leftStart + (center - leftStart - closeGap) * Math.min(1, p * 1.15) * approach;
  const rightX = rightStart - (rightStart - center - closeGap) * Math.min(1, p * 1.15) * approach;

  const leftPose = mode === 'kiss' ? 'kiss' : mode === 'hug' ? 'hug' : mode === 'love' ? 'love' : mode === 'dance' ? 'dance' : 'idle';
  const rightPose = leftPose;

  drawCharacter(ctx, 'pranjal', leftX, leftY + Math.sin(now / 180) * 1.5, { pose: leftPose, bob: Math.sin(now / 220) * 1.2 }, now);
  drawCharacter(ctx, 'fareeza', rightX, rightY - Math.sin(now / 180) * 1.5, { pose: rightPose, bob: Math.sin(now / 220) * 1.2 }, now);

  if (mode === 'kiss') {
    drawGlowHeart(ctx, center, 82, 14, 'rgba(255,182,193,.28)');
  } else if (mode === 'love') {
    drawGlowHeart(ctx, center, 82, 18, 'rgba(255,215,160,.22)');
  } else if (mode === 'hug') {
    drawGlowHeart(ctx, center, 84, 16, 'rgba(255,182,193,.18)');
  }
}

function drawGlowHeart(ctx, x, y, r, color = 'rgba(255,107,157,.35)') {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x - r * 0.4, y, r * 0.42, 0, Math.PI * 2);
  ctx.arc(x + r * 0.4, y, r * 0.42, 0, Math.PI * 2);
  ctx.moveTo(x - r * 0.8, y);
  ctx.lineTo(x, y + r * 0.95);
  ctx.lineTo(x + r * 0.8, y);
  ctx.closePath();
  ctx.fill();
}

function drawCharacter(ctx, type, x, y, opts = {}, now = performance.now()) {
  const pose = opts.pose || 'idle';
  const bob = opts.bob || 0;
  const lean = opts.lean || 0;
  const scale = opts.scale || 2.5;
  const lift = opts.lift || 0;
  const mouthLove = pose === 'kiss' || pose === 'love';
  const blush = opts.blush ?? (pose === 'kiss' || pose === 'hug' || pose === 'love' ? 1 : 0);
  const walk = pose === 'walk' ? Math.sin(now / 85) * 1.7 : 0;
  const dance = pose === 'dance' ? Math.sin(now / 120) * 2.8 : 0;
  const sit = pose === 'sit' ? 1 : 0;
  const bike = pose === 'bike' ? 1 : 0;

  ctx.save();
  ctx.translate(x + lean * 2, y + bob + lift);

  const p = (dx, dy, dw, dh, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(dx * scale, dy * scale, dw * scale, dh * scale);
  };

  const headY = pose === 'shy' ? 1 : 0;
  const faceY = 3 + headY;
  const torsoY = 8 + (pose === 'hug' ? 1 : 0) + (pose === 'kiss' ? 0 : 0);
  const armY = 8 + (pose === 'dance' ? -1 : 0);
  const legY = 13 + (pose === 'sit' ? 2 : 0) + (pose === 'bike' ? 1 : 0);

  if (type === 'pranjal') {
    p(4, 0, 4, 1, '#2c1a0e');
    p(3, 1, 6, 2, '#3d2612');
    p(3, 3 + headY, 6, 5, '#f4a77a');
    p(4, 4 + headY, 1, 1, '#1a0a2e');
    p(7, 4 + headY, 1, 1, '#1a0a2e');
    p(5, 7 + headY, 2, 1, mouthLove ? '#ffb7d2' : '#c0704a');
    if (blush) {
      p(3, 5 + headY, 1, 1, '#ff9ec0');
      p(8, 5 + headY, 1, 1, '#ff9ec0');
    }
    p(3, torsoY, 6, 5, '#e40026');
    p(5, torsoY, 2, 1, '#fff');
    if (pose === 'hug') {
      p(1, armY, 3, 3, '#f4a77a');
      p(8, armY, 3, 3, '#f4a77a');
      p(2, armY + 1, 2, 1, '#f4a77a');
      p(8, armY + 1, 2, 1, '#f4a77a');
    } else if (pose === 'kiss') {
      p(1, armY, 2, 4, '#f4a77a');
      p(9, armY, 2, 4, '#f4a77a');
      p(2, armY + 1, 2, 2, '#f4a77a');
      p(8, armY + 1, 2, 2, '#f4a77a');
    } else if (pose === 'dance') {
      p(0, armY - 1, 3, 2, '#f4a77a');
      p(9, armY - 2, 3, 2, '#f4a77a');
      p(2, armY + 1, 2, 4, '#f4a77a');
      p(8, armY + 1, 2, 4, '#f4a77a');
    } else if (pose === 'point') {
      p(1, armY, 3, 2, '#f4a77a');
      p(9, armY + 1, 3, 1, '#f4a77a');
      p(2, armY + 1, 2, 3, '#f4a77a');
      p(8, armY + 1, 2, 4, '#f4a77a');
    } else {
      p(1, armY, 2, 4, '#f4a77a');
      p(9, armY, 2, 4, '#f4a77a');
    }
    p(3, legY, 2, 6, '#1a1a2e');
    p(7, legY, 2, 6, '#1a1a2e');
    if (bike) {
      p(2, legY + 4 + walk, 3, 2, '#111');
      p(7, legY + 4 - walk, 3, 2, '#111');
    } else {
      p(2, 19, 3, 1, '#111');
      p(7, 19, 3, 1, '#111');
    }
  } else {
    p(2, 0, 8, 2, '#1a3a4a');
    p(2, 2, 8, 3, '#1a3a4a');
    p(1, 5, 1, 4, '#1a3a4a');
    p(10, 5, 1, 4, '#1a3a4a');
    p(3, 3 + headY, 6, 6, '#c8956c');
    p(4, 5 + headY, 1, 1, '#1a0a2e');
    p(7, 5 + headY, 1, 1, '#1a0a2e');
    p(4, 8 + headY, 4, 1, mouthLove ? '#ffb7d2' : '#9e5a3a');
    if (blush) {
      p(3, 6 + headY, 1, 1, '#ff9ec0');
      p(8, 6 + headY, 1, 1, '#ff9ec0');
    }
    p(2, 9 + (pose === 'hug' ? 1 : 0), 8, 6, '#9b7ec8');
    p(1, 9 + (pose === 'dance' ? -1 : 0), 1, 5, '#c4a8e8');
    p(10, 9 + (pose === 'dance' ? -1 : 0), 1, 5, '#c4a8e8');
    if (pose === 'hug') {
      p(1, armY, 3, 3, '#c8956c');
      p(8, armY, 3, 3, '#c8956c');
      p(2, armY + 1, 2, 1, '#c8956c');
      p(8, armY + 1, 2, 1, '#c8956c');
    } else if (pose === 'kiss') {
      p(1, armY, 2, 4, '#c8956c');
      p(9, armY, 2, 4, '#c8956c');
      p(2, armY + 1, 2, 2, '#c8956c');
      p(8, armY + 1, 2, 2, '#c8956c');
    } else if (pose === 'dance') {
      p(0, armY - 2, 3, 2, '#c8956c');
      p(9, armY - 1, 3, 2, '#c8956c');
      p(2, armY + 1, 2, 4, '#c8956c');
      p(8, armY + 1, 2, 4, '#c8956c');
    } else if (pose === 'point') {
      p(0, armY + 1, 3, 2, '#c8956c');
      p(9, armY, 3, 1, '#c8956c');
      p(2, armY + 1, 2, 3, '#c8956c');
      p(8, armY + 1, 2, 4, '#c8956c');
    } else {
      p(1, armY, 2, 4, '#c8956c');
      p(9, armY, 2, 4, '#c8956c');
    }
    p(2, 15 + sit, 8, 4, '#b399d8');
    if (pose === 'bike') {
      p(1, 15, 3, 1, '#4a3060');
      p(7, 15, 3, 1, '#4a3060');
    } else {
      p(3, 19, 3, 1, '#4a3060');
      p(7, 19, 3, 1, '#4a3060');
    }
  }

  ctx.restore();
}

function drawGolgappe(ctx, W, H, now) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a3d1a');
  g.addColorStop(1, '#0d2010');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.06)';
  ctx.fillRect(0, 0, W, 32);
  px(ctx, 0, 140, W, 60, '#3d2a1a');
  px(ctx, 150, 65, 180, 90, '#8b4513');
  px(ctx, 140, 50, 200, 22, '#ff6600');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('GOLGAPPE 🫙', 178, 65);

  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = ['#c0780a', '#d3a44c', '#b46f14'][i];
    ctx.beginPath();
    ctx.ellipse(185 + i * 55, 130 + Math.sin(now / 180 + i) * 2, 18, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  const p = motionProgress(now);
  const approach = easeInOutCubic(clamp01(p / 0.42));
  const leftX = lerp(62, 112, approach);
  const rightX = lerp(330, 288, approach);
  drawCharacter(ctx, 'pranjal', leftX, 90 + Math.sin(now / 220) * 1.2, { pose: sceneMotion?.kind === 'hug' ? 'hug' : 'idle', bob: 0 }, now);
  drawCharacter(ctx, 'fareeza', rightX, 90 - Math.sin(now / 220) * 1.2, { pose: sceneMotion?.kind === 'hug' ? 'hug' : 'idle', bob: 0 }, now);

  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(130, 48);
  for (let x = 130; x <= 340; x += 18) {
    ctx.lineTo(x + 9, 58);
    ctx.lineTo(x + 18, 48);
  }
  ctx.stroke();
  for (let x = 130; x <= 340; x += 18) {
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.arc(x + 9, 60 + Math.sin(now / 140 + x) * 0.8, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  if (sceneMotion?.kind === 'spark') {
    drawParticleCloud(ctx, now, 6, 224, 84, 28, ['✨', '💫', '💗'], 'rgba(255,255,255,.76)', 11);
  }
}

function drawMomos(ctx, W, H, now) {
  const p = motionProgress(now);
  const intro = p < 1;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#341325');
  g.addColorStop(1, '#120815');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = i % 2 ? 'rgba(255,215,0,.25)' : 'rgba(255,107,157,.24)';
    ctx.fillRect(18 + i * 54, 16 + (i % 3) * 4, 4, 4);
  }
  px(ctx, 0, 130, W, 50, '#3b2414');
  px(ctx, 0, 122, W, 10, '#6b4226');
  px(ctx, 134, 44, 180, 72, '#ff8f59');
  px(ctx, 142, 52, 164, 54, '#2a1020');
  ctx.fillStyle = '#ffe7b2';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('MOMOS DATE', 181, 62);
  ctx.fillStyle = '#ffd9e7';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('steam + spice + soft smiles', 146, 79);

  px(ctx, 156, 96, 136, 18, '#5f2b19');
  px(ctx, 166, 86, 116, 10, '#7f3a22');
  px(ctx, 194, 70, 60, 20, '#ffde9d');
  px(ctx, 198, 65, 52, 8, '#fff4c7');
  steamPuffs(ctx, now, 221, 82, 'rgba(255,230,205,.7)');

  const leftX = intro ? lerp(-32, 104, easeInOutCubic(p)) : 104;
  const rightX = intro ? lerp(470, 286, easeInOutCubic(p)) : 286;
  const kind = sceneMotion?.kind || 'steam';

  drawCharacter(ctx, 'pranjal', leftX, 90 + Math.sin(now / 150) * 1.4, {
    pose: kind === 'hug' ? 'hug' : kind === 'love' ? 'shy' : kind === 'spark' ? 'walk' : 'idle'
  }, now);
  drawCharacter(ctx, 'fareeza', rightX, 90 - Math.sin(now / 170) * 1.4, {
    pose: kind === 'hug' ? 'hug' : kind === 'love' ? 'shy' : kind === 'spark' ? 'walk' : 'idle'
  }, now);

  if (kind === 'steam' || kind === 'spice') {
    drawParticleCloud(ctx, now, 5, 220, 58, 18, ['🌫️', '🥟', '✨'], 'rgba(255,255,255,.76)', 10);
  }
  if (kind === 'hug') {
    drawGlowHeart(ctx, 224, 86, 16 + Math.sin(now / 90) * 2, 'rgba(255,182,193,.42)');
  }
  if (kind === 'love') {
    drawGlowHeart(ctx, 224, 72, 14 + Math.sin(now / 80) * 2, 'rgba(255,215,0,.36)');
    ctx.fillStyle = '#fff2d7';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('sharing food, sharing secrets', 156, 145);
  } else if (kind === 'spice') {
    ctx.fillStyle = '#ffe1a0';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('too spicy to be normal', 164, 145);
  } else {
    ctx.fillStyle = '#ffd4e1';
    ctx.font = 'bold 8px monospace';
    ctx.fillText('share a plate, share a grin', 160, 145);
  }
}

function drawBTS(ctx, W, H, now) {
  const p = motionProgress(now);
  const intro = p < 1;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#14091f');
  g.addColorStop(1, '#2a0f4a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(199,125,255,.14)';
  ctx.beginPath();
  ctx.ellipse(224, 92, 190, 56, 0, 0, Math.PI * 2);
  ctx.fill();

    drawCharacter(ctx, 'pranjal', 92 + Math.sin(now / 180) * 2, 92, { pose: 'point' }, now);
    drawCharacter(ctx, 'fareeza', 314 - Math.sin(now / 180) * 2, 92, { pose: 'point' }, now);
    sceneText(ctx, 'a train comes and goes', 176, 146, '#ffd4e1', 8);
  } else {
    px(ctx, 0, 134, W, 46, '#201425');
    px(ctx, 0, 124, W, 8, '#ffd86a');
    for (let i = 0; i < 16; i++) {
      const fx = 40 + i * 24 + Math.sin(now / 140 + i) * 6;
      const fy = 108 - (i % 4) * 6 - ((now / 18 + i * 13) % 56);
      ctx.fillStyle = i % 3 === 0 ? 'rgba(255,255,255,.8)' : 'rgba(255,246,210,.72)';
      ctx.beginPath();
      ctx.arc(fx, fy, i % 3 === 0 ? 3 : 2, 0, Math.PI * 2);
      ctx.fill();
    }
    sceneText(ctx, 'DANDELION ENDING', 170, 54, '#fff2d7', 10);
    sceneText(ctx, 'the quiet after the dream keeps glowing', 118, 74, '#fff0eb', 8);
    drawCharacter(ctx, 'pranjal', 132 + Math.sin(now / 200) * 2, 96, { pose: 'idle' }, now);
    drawCharacter(ctx, 'fareeza', 288 - Math.sin(now / 220) * 2, 96, { pose: 'idle' }, now);
    drawParticleCloud(ctx, now, 10, 224, 98, 38, ['🌼', '✨', '🌾'], 'rgba(255,255,255,.82)', 12);
    sceneText(ctx, 'promise. future. together.', 162, 146, '#7b3f58', 8);
  }

  const captions = [
    'a bicycle arrives',
    'steam rises from the kitchen',
    'a train crosses the night',
    'the ending stays warm'
  ];
  ctx.fillStyle = 'rgba(20, 7, 20, .28)';
  ctx.fillRect(88, 18, 272, 22);
  sceneText(ctx, captions[phase], 104, 34, phase === 3 ? '#7b3f58' : '#ffd9e7', 8);
  if (!Number.isFinite(elapsed) || elapsed < 0) {
    sceneText(ctx, 'dream loading...', 172, 110, '#ffd9e7', 10);
  }
}

function playSceneMotionAndDraw(kind, duration, meta) {
  playSceneMotion(kind, duration, meta);
  if (currentLoc && currentLoc !== 'dream') {
    drawScene(currentLoc);
  }
}


window.leaveRoom = async () => {
  try { clearTyping(); } catch (_) {}
  clearRoomListeners();
  stopSceneLoop();
  stopDreamLoop();
  roomCode = null;
  roomRef = null;
  currentLoc = null;
  hearts = 2;
  updateHeartsBar();
  document.getElementById('chat-area').innerHTML = '';
  const fx = document.querySelector('.romance-fx'); if (fx) fx.remove();
  document.getElementById('typing-indicator').classList.remove('visible');
  document.getElementById('join-code-input').value = '';
  dreamUnlockShown = false;
  try {
    localStorage.removeItem(STORAGE_ROOM);
  } catch (_) {}
  showScreen('s-join');
  document.getElementById('room-panel').style.display = myRole ? 'block' : 'none';
  if (myRole) {
    document.getElementById('room-panel-title').textContent = `HEY ${myRole}! CREATE OR JOIN?`;
  }
  showToast('left the room');
};

document.addEventListener('DOMContentLoaded', () => {
  loadSession();
});

window.addEventListener('error', (event) => {
  const msg = event?.error?.message || event?.message || 'unknown error';
  showToast(`JS error: ${msg}`, 3500);
});


window.addEventListener('beforeunload', () => {
  try { clearTyping(); } catch (_) {}
  clearRoomListeners();
  stopSceneLoop();
  stopDreamLoop();
});
</script>
</body>
</html>
