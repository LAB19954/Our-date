<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<style>
  body { background: #111; color: #fff; font-family: monospace; font-size: 14px; padding: 20px; }
  button { padding: 12px 20px; margin: 8px; background: #ff6b9d; border: none; color: #000; font-size: 14px; cursor: pointer; border-radius: 4px; }
  #log { background: #1a1a1a; padding: 16px; border-radius: 8px; margin-top: 16px; min-height: 200px; white-space: pre-wrap; line-height: 1.8; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #ffd700; }
</style>
</head>
<body>
<h2>🔥 Firebase Debug</h2>
<button onclick="runTest()">▶ RUN TEST</button>
<div id="log">tap the button to start...\n</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const log = (msg, type='info') => {
  const el = document.getElementById('log');
  const cls = type === 'ok' ? '✅' : type === 'err' ? '❌' : 'ℹ️';
  el.innerHTML += `<span class="${type}">${cls} ${msg}</span>\n`;
  console.log(msg);
};

window.runTest = async () => {
  document.getElementById('log').innerHTML = '';
  log('starting firebase test...', 'info');

  // STEP 1: init
  let app, db;
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyBJ5NfCKdANAyvTJq4O77r9spJmbOb2Z6I",
      authDomain: "e-simulator-a96d8.firebaseapp.com",
      databaseURL: "https://e-simulator-a96d8-default-rtdb.firebaseio.com",
      projectId: "e-simulator-a96d8",
      storageBucket: "e-simulator-a96d8.firebasestorage.app",
      messagingSenderId: "391209468311",
      appId: "1:391209468311:web:24b3993e634af7300744d2"
    };
    app = initializeApp(firebaseConfig);
    log('firebase app initialized', 'ok');
    db = getDatabase(app);
    log('database instance created', 'ok');
  } catch(e) {
    log('INIT FAILED: ' + e.message, 'err');
    return;
  }

  // STEP 2: write test
  try {
    log('trying to WRITE to database...', 'info');
    await set(ref(db, 'test/ping'), {
      value: 'hello!',
      time: serverTimestamp()
    });
    log('WRITE successful!', 'ok');
  } catch(e) {
    log('WRITE FAILED: ' + e.message, 'err');
    log('→ this is likely a rules problem. go to Firebase → Realtime Database → Rules and set .read/.write to true', 'err');
    return;
  }

  // STEP 3: read test
  try {
    log('trying to READ from database...', 'info');
    const snap = await get(ref(db, 'test/ping'));
    if (snap.exists()) {
      log('READ successful! value: ' + JSON.stringify(snap.val()), 'ok');
    } else {
      log('READ returned empty — weird', 'err');
    }
  } catch(e) {
    log('READ FAILED: ' + e.message, 'err');
    return;
  }

  log('ALL TESTS PASSED! firebase is working 🎉', 'ok');
  log('you can now use the main game file', 'ok');
};
</script>
</body>
</html>
