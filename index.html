<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranjal & Fareeza 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#ff6b9d;--soft-pink:#ffc2d9;--dark:#0e0818;--mid:#1e1230;
  --accent:#e40026;--gold:#ffd700;--text:#fff5f8;--green:#4ade80;
}
body{
  background:var(--dark);color:var(--text);
  font-family:'Press Start 2P',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 38%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 8%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 78% 55%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 43% 78%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 28%,#fff 0%,transparent 100%),
    radial-gradient(2px 2px at 33% 52%,rgba(255,180,210,.7) 0%,transparent 100%),
    radial-gradient(2px 2px at 65% 85%,rgba(255,180,210,.7) 0%,transparent 100%);
}

/* ── SCREENS ── */
.screen{position:relative;z-index:1;width:100%;max-width:480px;padding:16px;display:none;flex-direction:column;gap:14px;animation:fadeIn .4s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── TITLE ── */
#s-title{align-items:center;text-align:center;padding-top:40px;}
.title-emoji{font-size:36px;animation:float 2.4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-size:clamp(11px,3vw,16px);color:var(--pink);line-height:2.2;text-shadow:3px 3px 0 #6b0030;}
.tagline{font-family:'VT323',monospace;font-size:20px;color:var(--soft-pink);}
.divider{width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:4px 0;}

/* ── BUTTONS ── */
.btn{
  font-family:'Press Start 2P',monospace;font-size:9px;padding:13px 18px;
  border:3px solid var(--pink);background:var(--mid);color:var(--text);
  cursor:pointer;box-shadow:4px 4px 0 #6b0030;transition:all .08s;
  line-height:1.6;text-align:center;
}
.btn:hover,.btn:focus{background:var(--pink);color:var(--dark);transform:translate(-2px,-2px);box-shadow:6px 6px 0 #6b0030;outline:none;}
.btn:active{transform:translate(1px,1px);box-shadow:2px 2px 0 #6b0030;}
.btn.gold{border-color:var(--gold);box-shadow:4px 4px 0 #7a6000;}
.btn.gold:hover{background:var(--gold);color:var(--dark);box-shadow:6px 6px 0 #7a6000;}
.btn.red{border-color:var(--accent);box-shadow:4px 4px 0 #700010;}
.btn.red:hover{background:var(--accent);box-shadow:6px 6px 0 #700010;}
.btn.sm{font-size:7px;padding:8px 12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
@keyframes pulse{0%,100%{box-shadow:4px 4px 0 #6b0030}50%{box-shadow:4px 4px 14px #ff6b9d88}}
.btn.pulse{animation:pulse 1.5s ease-in-out infinite;}

/* ── INPUT ── */
.field-label{font-size:7px;color:var(--soft-pink);margin-bottom:4px;}
input[type=text]{
  font-family:'VT323',monospace;font-size:20px;
  background:var(--mid);border:2px solid var(--soft-pink);
  color:var(--text);padding:10px 12px;width:100%;outline:none;
}
input[type=text]:focus{border-color:var(--pink);}
input[type=text]::placeholder{color:#6b4a6b;}

/* ── PANEL ── */
.panel{background:var(--mid);border:3px solid var(--pink);padding:14px;box-shadow:4px 4px 0 #6b0030;}
.panel-title{font-size:8px;color:var(--gold);margin-bottom:10px;}

/* ── ROOM SCREEN ── */
.room-code-display{
  font-family:'VT323',monospace;font-size:48px;color:var(--gold);
  text-align:center;letter-spacing:8px;text-shadow:3px 3px 0 #7a6000;
  padding:12px 0;
}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.dot-waiting{background:#888;animation:dotBlink 1s step-end infinite;}
.dot-online{background:var(--green);}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.2}}
.player-list{display:flex;flex-direction:column;gap:6px;}
.player-row{font-family:'VT323',monospace;font-size:18px;display:flex;align-items:center;gap:8px;}

/* ── SCENE ── */
#scene-canvas{width:100%;height:180px;display:block;image-rendering:pixelated;border:3px solid var(--pink);box-shadow:4px 4px 0 #6b0030;}
.loc-banner{background:var(--mid);border:3px solid var(--pink);padding:8px 12px;font-family:'VT323',monospace;font-size:20px;color:var(--gold);text-align:center;box-shadow:4px 4px 0 #6b0030;}

/* ── CHAT ── */
#chat-area{
  height:240px;overflow-y:auto;background:var(--dark);
  border:3px solid var(--soft-pink);padding:10px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;
}
#chat-area::-webkit-scrollbar{width:4px;}
#chat-area::-webkit-scrollbar-thumb{background:var(--pink);}
.msg{display:flex;flex-direction:column;gap:3px;max-width:88%;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.msg.them{align-self:flex-start;align-items:flex-start;}
.msg.system{align-self:center;align-items:center;max-width:100%;}
.msg-name{font-size:6px;color:var(--soft-pink);}
.msg.me .msg-name{color:var(--gold);}
.msg-bubble{
  font-family:'VT323',monospace;font-size:18px;
  padding:8px 12px;line-height:1.4;word-break:break-word;
}
.msg.me .msg-bubble{background:var(--pink);color:var(--dark);}
.msg.them .msg-bubble{background:var(--mid);border:2px solid var(--soft-pink);color:var(--text);}
.msg.system .msg-bubble{background:transparent;color:#888;font-size:14px;border:none;text-align:center;}
.msg.action-msg .msg-bubble{background:#2a1a3e;border:2px solid var(--gold);color:var(--gold);}
.msg.action-msg{align-self:center;align-items:center;max-width:100%;}
.typing-indicator{font-family:'VT323',monospace;font-size:16px;color:#888;padding:4px 10px;display:none;}
.typing-indicator.visible{display:block;}

/* ── CHAT INPUT ── */
.chat-input-row{display:flex;gap:6px;}
#chat-input{flex:1;font-family:'VT323',monospace;font-size:20px;background:var(--mid);border:2px solid var(--soft-pink);color:var(--text);padding:10px 12px;outline:none;}
#chat-input:focus{border-color:var(--pink);}
#send-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 12px;border:2px solid var(--pink);background:var(--pink);color:var(--dark);cursor:pointer;}
#send-btn:hover{background:var(--soft-pink);}

/* ── ACTIONS GRID ── */
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

/* ── LOC PICKER ── */
.loc-grid{display:flex;flex-direction:column;gap:8px;}
.loc-btn{
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:12px 10px;border:2px solid var(--soft-pink);
  background:var(--mid);color:var(--text);cursor:pointer;
  text-align:left;line-height:1.8;box-shadow:3px 3px 0 #6b0030;
}
.loc-btn:hover{border-color:var(--gold);background:#2d1b4e;transform:translate(-2px,-2px);box-shadow:5px 5px 0 #6b0030;}

/* ── LOVE BAR ── */
.love-bar-wrap{display:flex;align-items:center;gap:8px;font-family:'VT323',monospace;font-size:18px;}
.love-bar-outer{flex:1;background:#0e0818;border:2px solid var(--pink);height:14px;}
.love-bar-inner{height:100%;background:linear-gradient(90deg,#ff6b9d,#ff3878);transition:width .5s;}
.love-count{color:var(--gold);min-width:48px;}

/* ── HUG BTN ── */
#hug-btn{
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:10px;border:3px solid var(--soft-pink);
  background:var(--mid);color:var(--soft-pink);cursor:pointer;
  box-shadow:3px 3px 0 #6b0030;
}
#hug-btn:hover{background:var(--soft-pink);color:var(--dark);}

/* ── PARTICLES ── */
.heart-pop{position:fixed;pointer-events:none;font-size:22px;animation:heartFly 1.3s ease-out forwards;z-index:999;}
@keyframes heartFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-130px) scale(2)}}
.stat-flash{position:fixed;pointer-events:none;font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold);text-shadow:2px 2px 0 var(--dark);animation:statFly 1s ease-out forwards;z-index:999;}
@keyframes statFly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* ── ERROR / TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:'VT323',monospace;font-size:18px;
  background:var(--mid);border:2px solid var(--pink);
  color:var(--text);padding:10px 20px;z-index:999;
  animation:toastIn .3s ease;display:none;
}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ══ TITLE SCREEN ══ -->
<div class="screen active" id="s-title">
  <div class="title-emoji">💕</div>
  <h1>PRANJAL & FAREEZA</h1>
  <div class="tagline">~ A Date Adventure ~</div>
  <div class="divider"></div>
  <div class="tagline" style="font-size:14px;color:#c8a0c8;">golgappe · F1 · trains · forever ✨</div>
  <div style="height:16px;"></div>
  <button class="btn pulse" onclick="showScreen('s-join')">▶ START</button>
</div>

<!-- ══ JOIN SCREEN ══ -->
<div class="screen" id="s-join">
  <div class="panel">
    <div class="panel-title">🔑 WHO ARE YOU?</div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1;font-size:8px;" onclick="setRole('PRANJAL')">👦 I'M PRANJAL</button>
      <button class="btn" style="flex:1;font-size:8px;" onclick="setRole('FAREEZA')">👧 I'M FAREEZA</button>
    </div>
  </div>
  <div class="panel" id="room-panel" style="display:none;">
    <div class="panel-title" id="room-panel-title">CREATE OR JOIN?</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn gold" onclick="createRoom()">✨ CREATE ROOM</button>
      <div style="text-align:center;font-family:'VT323',monospace;font-size:16px;color:#888;">— or join existing —</div>
      <div class="field-label">ROOM CODE</div>
      <input type="text" id="join-code-input" placeholder="e.g. LOVE42" maxlength="8" style="text-transform:uppercase;">
      <button class="btn" onclick="joinRoom()">🚪 JOIN ROOM</button>
    </div>
  </div>
</div>

<!-- ══ LOBBY SCREEN ══ -->
<div class="screen" id="s-lobby">
  <div class="panel">
    <div class="panel-title">📡 ROOM CODE — SHARE THIS!</div>
    <div class="room-code-display" id="lobby-code">----</div>
    <div style="font-family:'VT323',monospace;font-size:14px;color:#888;text-align:center;">send this code to the other person 💕</div>
  </div>
  <div class="panel">
    <div class="panel-title">👥 PLAYERS</div>
    <div class="player-list" id="player-list"></div>
  </div>
  <button class="btn gold" id="start-date-btn" style="display:none;" onclick="startDate()">💕 START THE DATE!</button>
  <button class="btn sm" style="border-color:#555;color:#888;" onclick="copyCode()">📋 COPY CODE</button>
</div>

<!-- ══ LOCATION PICK ══ -->
<div class="screen" id="s-loc">
  <div class="loc-banner">🗺 WHERE TO, LOVEBIRDS?</div>
  <div class="loc-grid">
    <button class="loc-btn" onclick="pickLocation('golgappe')">🫙 Golgappe Stall &nbsp;— the OG date spot</button>
    <button class="loc-btn" onclick="pickLocation('f1')">🏎️ Ferrari Watch Party — scuderia forever 🔴</button>
    <button class="loc-btn" onclick="pickLocation('train')">🚂 Train Station — spotting trains together</button>
    <button class="loc-btn" onclick="pickLocation('stars')">🌌 Rooftop Stargazing — just you two</button>
    <button class="loc-btn" onclick="pickLocation('iit')">🎓 IIT Campus Walk — future goals 🌸</button>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div class="screen" id="s-game">
  <div class="loc-banner" id="loc-name-banner">📍 Somewhere</div>
  <canvas id="scene-canvas" width="448" height="180"></canvas>

  <div class="love-bar-wrap">
    <span>💗</span>
    <div class="love-bar-outer"><div class="love-bar-inner" id="love-bar" style="width:20%;"></div></div>
    <div class="love-count" id="love-count">♥ 2</div>
  </div>

  <div id="chat-area"></div>
  <div class="typing-indicator" id="typing-indicator">✏️ <span id="typing-name">someone</span> is typing...</div>

  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="type something..." maxlength="200"
      oninput="onTyping()" onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="send-btn" onclick="sendMessage()">▶</button>
  </div>

  <div class="actions-grid" id="actions-grid"></div>

  <div style="display:flex;gap:6px;">
    <button id="hug-btn" onclick="sendHug()" style="flex:1;">🤗 HUG!</button>
    <button class="btn sm" style="flex:1;" onclick="showScreen('s-loc')">🗺 CHANGE LOC</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, onChildAdded, update, serverTimestamp, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════════════════════
//  🔧 PASTE YOUR FIREBASE CONFIG HERE
// ══════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
// ══════════════════════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──────────────────────────────────────────────────────
let myRole = null;      // 'PRANJAL' | 'FAREEZA'
let roomCode = null;
let roomRef = null;
let hearts = 2;
let maxHearts = 14;
let currentLoc = null;
let typingTimeout = null;
let lastMsgKey = null;

// ── SCREEN MANAGER ─────────────────────────────────────────────
window.showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

// ── ROLE SELECT ────────────────────────────────────────────────
window.setRole = (role) => {
  myRole = role;
  document.getElementById('room-panel').style.display = 'block';
  document.getElementById('room-panel-title').textContent =
    `HEY ${role}! CREATE OR JOIN?`;
};

// ── ROOM CODE GEN ──────────────────────────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ── CREATE ROOM ────────────────────────────────────────────────
window.createRoom = async () => {
  if (!myRole) { showToast('pick who you are first!'); return; }
  roomCode = genCode();
  roomRef = ref(db, `rooms/${roomCode}`);
  await set(roomRef, {
    createdAt: serverTimestamp(),
    players: { [myRole]: true },
    hearts: 2,
    location: null,
    started: false
  });
  enterLobby();
};

// ── JOIN ROOM ──────────────────────────────────────────────────
window.joinRoom = async () => {
  if (!myRole) { showToast('pick who you are first!'); return; }
  const code = document.getElementById('join-code-input').value.toUpperCase().trim();
  if (!code) { showToast('enter a room code!'); return; }
  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { showToast('room not found 😭'); return; }
  roomCode = code;
  roomRef = ref(db, `rooms/${roomCode}`);
  await update(ref(db, `rooms/${roomCode}/players`), { [myRole]: true });
  enterLobby();
};

// ── LOBBY ──────────────────────────────────────────────────────
function enterLobby() {
  document.getElementById('lobby-code').textContent = roomCode;
  showScreen('s-lobby');

  onValue(ref(db, `rooms/${roomCode}/players`), snap => {
    const players = snap.val() || {};
    const list = document.getElementById('player-list');
    list.innerHTML = '';
    ['PRANJAL','FAREEZA'].forEach(name => {
      const row = document.createElement('div');
      row.className = 'player-row';
      const dot = document.createElement('span');
      dot.className = 'status-dot ' + (players[name] ? 'dot-online' : 'dot-waiting');
      const label = document.createElement('span');
      label.style.fontFamily = 'VT323,monospace';
      label.style.fontSize = '20px';
      label.textContent = players[name]
        ? (name === 'PRANJAL' ? '👦 Pranjal — online' : '👧 Fareeza — online')
        : (name === 'PRANJAL' ? '👦 Pranjal — waiting...' : '👧 Fareeza — waiting...');
      row.appendChild(dot); row.appendChild(label);
      list.appendChild(row);
    });
    const both = players.PRANJAL && players.FAREEZA;
    document.getElementById('start-date-btn').style.display = both ? 'block' : 'none';
  });

  // Listen for game start
  onValue(ref(db, `rooms/${roomCode}/started`), snap => {
    if (snap.val() === true) {
      showScreen('s-loc');
      listenGameState();
    }
  });
}

window.startDate = async () => {
  await update(roomRef, { started: true });
};

window.copyCode = () => {
  navigator.clipboard.writeText(roomCode).then(() => showToast('code copied! 📋'));
};

// ── LOCATION PICK ──────────────────────────────────────────────
const LOCATIONS = {
  golgappe: { name:'🫙 GOLGAPPE STALL', actions:[
    {label:'🫙 Order the spiciest ones', key:'spicy'},
    {label:'💕 Feed her one', key:'feed'},
    {label:'📸 Take a pic together', key:'pic'},
    {label:'🌶️ Eating challenge!', key:'challenge'},
  ]},
  f1: { name:'🏎️ FERRARI WATCH PARTY', actions:[
    {label:'🔴 FORZA FERRARI!!', key:'forza'},
    {label:'😭 DNF cry session', key:'dnf'},
    {label:'🍿 Steal her popcorn', key:'popcorn'},
    {label:'🏆 Leclerc wins!!!', key:'win'},
  ]},
  train: { name:'🚂 TRAIN STATION', actions:[
    {label:'🚂 Spot & name a train', key:'spot'},
    {label:'🌅 Watch sunset together', key:'sunset'},
    {label:'☕ Chai from platform stall', key:'chai'},
    {label:'🎵 Hum a song', key:'hum'},
  ]},
  stars: { name:'🌌 ROOFTOP STARGAZING', actions:[
    {label:'⭐ Name a star after her', key:'namestar'},
    {label:'🌙 Just exist together', key:'exist'},
    {label:'💫 Make a wish', key:'wish'},
    {label:'🌠 Spot a shooting star', key:'shoot'},
  ]},
  iit: { name:'🎓 IIT CAMPUS WALK', actions:[
    {label:'🌊 Walk by the lake', key:'lake'},
    {label:'📚 Future study sessions', key:'future'},
    {label:'🌸 Pick a flower for her', key:'flower'},
    {label:'🤝 Make a promise', key:'promise'},
  ]},
};

const ACTION_MSGS = {
  spicy:    { text:'ordered the EXTRA SPICY ones 🌶️ eyes watering guaranteed', hearts:1 },
  feed:     { text:'fed her a golgappa 💕 *smiles*', hearts:2 },
  pic:      { text:'took a pic together 📸 best photo ever', hearts:1 },
  challenge:{ text:'started a golgappa eating challenge 😭', hearts:1 },
  forza:    { text:'screamed FORZA FERRARI!!! 🔴 neighbors can hear', hearts:1 },
  dnf:      { text:'cried together when Ferrari DNF\'d 😭 emotional support hugs', hearts:2 },
  popcorn:  { text:'stole her popcorn 🍿 *pretends to be innocent*', hearts:1 },
  win:      { text:'LECLERC WINS!! celebrated like crazy 🏆🔴', hearts:3 },
  spot:     { text:'spotted a train and named it immediately 🚂 nerd moment', hearts:1 },
  sunset:   { text:'watched the sunset from the platform 🌅 *quiet moment*', hearts:2 },
  chai:     { text:'got cutting chai from the platform stall ☕ *sharing one cup*', hearts:2 },
  hum:      { text:'started humming a song together 🎵 no one asked but okay', hearts:2 },
  namestar: { text:'named a star "Fareeza" ⭐ not scientifically valid but emotionally real', hearts:3 },
  exist:    { text:'just lay there looking at the sky 🌌 *shoulder touch*', hearts:2 },
  wish:     { text:'made a wish 💫 won\'t tell what it was. (it was you.)', hearts:3 },
  shoot:    { text:'spotted a shooting star together 🌠 both wished the same thing probably', hearts:2 },
  lake:     { text:'walked by the campus lake together 🌊 future feels', hearts:2 },
  future:   { text:'planned future study sessions here 📚 "you\'re my best distraction"', hearts:1 },
  flower:   { text:'picked a small flower and gave it to her 🌸 saved from exam day', hearts:3 },
  promise:  { text:'made a promise — Germany, F1, together 🏎️💕', hearts:3 },
};

window.pickLocation = async (loc) => {
  await update(roomRef, { location: loc });
  goToLocation(loc);
};

function goToLocation(loc) {
  currentLoc = loc;
  const locData = LOCATIONS[loc];
  document.getElementById('loc-name-banner').textContent = locData.name;
  drawScene(loc);
  renderActions(loc);
  showScreen('s-game');
}

// ── GAME STATE LISTENER ────────────────────────────────────────
function listenGameState() {
  // Hearts
  onValue(ref(db, `rooms/${roomCode}/hearts`), snap => {
    hearts = snap.val() || 2;
    updateHeartsBar();
  });
  // Location changes
  onValue(ref(db, `rooms/${roomCode}/location`), snap => {
    const loc = snap.val();
    if (loc && loc !== currentLoc) goToLocation(loc);
  });
  // Chat messages
  lastMsgKey = null;
  onChildAdded(ref(db, `rooms/${roomCode}/messages`), snap => {
    const msg = snap.val();
    if (!msg) return;
    appendMessage(msg);
  });
  // Typing
  onValue(ref(db, `rooms/${roomCode}/typing`), snap => {
    const typing = snap.val() || {};
    const others = Object.entries(typing).filter(([k,v]) => k !== myRole && v);
    const ind = document.getElementById('typing-indicator');
    const nameEl = document.getElementById('typing-name');
    if (others.length) {
      nameEl.textContent = others[0][0].toLowerCase();
      ind.classList.add('visible');
    } else {
      ind.classList.remove('visible');
    }
  });
}

// ── CHAT ───────────────────────────────────────────────────────
window.onTyping = () => {
  update(ref(db, `rooms/${roomCode}/typing`), { [myRole]: true });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    update(ref(db, `rooms/${roomCode}/typing`), { [myRole]: false });
  }, 1800);
};

window.sendMessage = async () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  update(ref(db, `rooms/${roomCode}/typing`), { [myRole]: false });
  await push(ref(db, `rooms/${roomCode}/messages`), {
    sender: myRole,
    text,
    type: 'chat',
    ts: serverTimestamp()
  });
};

function appendMessage(msg) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg';

  if (msg.type === 'system' || msg.type === 'action') {
    wrap.classList.add(msg.type === 'action' ? 'action-msg' : 'system');
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text;
    wrap.appendChild(bubble);
  } else {
    wrap.classList.add(msg.sender === myRole ? 'me' : 'them');
    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = msg.sender;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text;
    wrap.appendChild(name);
    wrap.appendChild(bubble);
  }

  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

// ── DATE ACTIONS ───────────────────────────────────────────────
function renderActions(loc) {
  const grid = document.getElementById('actions-grid');
  grid.innerHTML = '';
  const actions = LOCATIONS[loc]?.actions || [];
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn sm' + (loc === 'f1' ? ' red' : '');
    btn.textContent = a.label;
    btn.onclick = () => doAction(a.key);
    grid.appendChild(btn);
  });
}

async function doAction(key) {
  const actionData = ACTION_MSGS[key];
  if (!actionData) return;
  const text = `✨ ${myRole}: ${actionData.text}`;
  await push(ref(db, `rooms/${roomCode}/messages`), { sender: myRole, text, type:'action', ts: serverTimestamp() });
  const newHearts = Math.min(hearts + actionData.hearts, maxHearts);
  await update(roomRef, { hearts: newHearts });
  spawnHearts(actionData.hearts);
  showStatFlash(`+${actionData.hearts} 💗`);
}

window.sendHug = async () => {
  await push(ref(db, `rooms/${roomCode}/messages`), {
    sender: myRole,
    text: `🤗 ${myRole} hugged ${myRole === 'PRANJAL' ? 'Fareeza' : 'Pranjal'}!! *squeezes tight* 💕`,
    type: 'action',
    ts: serverTimestamp()
  });
  const newHearts = Math.min(hearts + 2, maxHearts);
  await update(roomRef, { hearts: newHearts });
  spawnHeartBurst();
  showStatFlash('+2 💗');
};

// ── HEARTS ─────────────────────────────────────────────────────
function updateHeartsBar() {
  const pct = Math.min((hearts / maxHearts) * 100, 100);
  document.getElementById('love-bar').style.width = pct + '%';
  document.getElementById('love-count').textContent = `♥ ${hearts}`;
}

function spawnHearts(n) {
  for (let i = 0; i < Math.min(n * 2, 8); i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-pop';
      el.textContent = ['💗','💕','💖','💝'][Math.floor(Math.random()*4)];
      el.style.left = (25 + Math.random() * 50) + '%';
      el.style.top = (35 + Math.random() * 25) + '%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }, i * 130);
  }
}

function spawnHeartBurst() {
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-pop';
      el.textContent = ['💗','💕','💖','💝','🤗'][Math.floor(Math.random()*5)];
      el.style.left = (15 + Math.random() * 70) + '%';
      el.style.top = (25 + Math.random() * 40) + '%';
      el.style.fontSize = (16 + Math.random()*18) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }, i * 90);
  }
}

function showStatFlash(text) {
  const el = document.createElement('div');
  el.className = 'stat-flash';
  el.textContent = text;
  el.style.cssText = 'left:50%;top:38%;transform:translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ── TOAST ──────────────────────────────────────────────────────
window.showToast = (msg, dur=2200) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
};

// ── SCENE DRAWING ──────────────────────────────────────────────
function drawScene(loc) {
  const canvas = document.getElementById('scene-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const scenes = { golgappe: drawGolgappe, f1: drawF1, train: drawTrain, stars: drawStarsScene, iit: drawIIT };
  (scenes[loc] || drawGolgappe)(ctx, W, H);
}

function px(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function drawCharacter(ctx, type, x, y) {
  const s=2.5;
  const p=(dx,dy,dw,dh,c)=>{ctx.fillStyle=c;ctx.fillRect(x+dx*s,y+dy*s,dw*s,dh*s);};
  if(type==='pranjal'){
    p(4,0,4,1,'#2c1a0e');p(3,1,6,2,'#3d2612');
    p(3,3,6,5,'#f4a77a');
    p(4,4,1,1,'#1a0a2e');p(7,4,1,1,'#1a0a2e');
    p(5,7,2,1,'#c0704a');
    p(3,8,6,5,'#e40026');p(5,8,2,1,'#fff');
    p(1,8,2,4,'#f4a77a');p(9,8,2,4,'#f4a77a');
    p(3,13,2,6,'#1a1a2e');p(7,13,2,6,'#1a1a2e');
    p(2,19,3,1,'#111');p(7,19,3,1,'#111');
  } else {
    p(2,0,8,2,'#1a3a4a');p(2,2,8,3,'#1a3a4a');
    p(1,5,1,4,'#1a3a4a');p(10,5,1,4,'#1a3a4a');
    p(3,3,6,6,'#c8956c');
    p(4,5,1,1,'#1a0a2e');p(7,5,1,1,'#1a0a2e');
    p(4,8,4,1,'#9e5a3a');
    p(2,9,8,6,'#9b7ec8');
    p(1,9,1,5,'#c4a8e8');p(10,9,1,5,'#c4a8e8');
    p(1,9,1,4,'#c8956c');p(10,9,1,4,'#c8956c');
    p(2,15,8,4,'#b399d8');
    p(3,19,3,1,'#4a3060');p(7,19,3,1,'#4a3060');
  }
}

function drawGolgappe(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#1a3d1a');g.addColorStop(1,'#0d2010');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  px(ctx,0,140,W,60,'#3d2a1a');
  px(ctx,150,65,180,90,'#8b4513');
  px(ctx,140,50,200,22,'#ff6600');
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.fillText('GOLGAPPE 🫙',178,65);
  [[185,130],[240,130],[295,130]].forEach(([x,y])=>{
    ctx.fillStyle='#c0780a';ctx.beginPath();ctx.ellipse(x,y,18,10,0,0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(130,48);
  for(let x=130;x<=340;x+=18){ctx.lineTo(x+9,58);ctx.lineTo(x+18,48);}ctx.stroke();
  for(let x=130;x<=340;x+=18){ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(x+9,60,3,0,Math.PI*2);ctx.fill();}
  drawCharacter(ctx,'pranjal',70,90);
  drawCharacter(ctx,'fareeza',330,90);
}

function drawF1(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2a0005');g.addColorStop(1,'#0d0005');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  px(ctx,120,20,220,130,'#111');px(ctx,130,30,200,110,'#1a6b32');
  px(ctx,150,70,160,35,'#888');
  px(ctx,195,78,55,18,'#e40026');
  px(ctx,193,92,11,7,'#111');px(ctx,247,92,11,7,'#111');
  px(ctx,208,76,28,4,'#ff0');
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(130,30,75,18);
  ctx.fillStyle='#e40026';ctx.font='bold 9px monospace';ctx.fillText('P1 LECLERC',133,42);
  ctx.strokeStyle='#444';ctx.lineWidth=5;ctx.strokeRect(120,20,220,130);
  px(ctx,50,145,360,45,'#3d1a00');px(ctx,50,132,55,16,'#5a2800');px(ctx,355,132,55,16,'#5a2800');
  ctx.fillStyle='#c0780a';ctx.beginPath();ctx.ellipse(250,143,16,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fffde7';for(let i=0;i<4;i++){ctx.fillRect(244+i*5,138,4,4);}
  drawCharacter(ctx,'pranjal',95,108);
  drawCharacter(ctx,'fareeza',315,108);
}

function drawTrain(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0d1a2e');g.addColorStop(1,'#060d1a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  px(ctx,0,130,W,70,'#888');px(ctx,0,128,W,7,'#aaa');px(ctx,0,134,W,4,'#ffd700');
  px(ctx,0,170,W,5,'#555');px(ctx,0,183,W,5,'#555');
  for(let x=0;x<W;x+=28){px(ctx,x,168,18,22,'#6b4226');}
  px(ctx,0,82,260,68,'#1565c0');px(ctx,0,82,260,10,'#0d47a1');
  ctx.fillStyle='#bbdefb';for(let i=0;i<3;i++){px(ctx,10+i*55,94,38,26,'#bbdefb');}
  px(ctx,0,82,13,68,'#f57f17');
  ctx.fillStyle='rgba(255,150,50,.2)';ctx.beginPath();ctx.arc(410,72,55,0,Math.PI*2);ctx.fill();
  [[40,18],[110,38],[190,12],[310,28],[420,8]].forEach(([x,y])=>{px(ctx,x,y,2,2,'rgba(255,255,200,.8)');});
  px(ctx,175,116,120,16,'#4a3000');px(ctx,185,108,7,10,'#4a3000');px(ctx,278,108,7,10,'#4a3000');
  drawCharacter(ctx,'pranjal',65,90);
  drawCharacter(ctx,'fareeza',335,90);
}

function drawStarsScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#030010');g.addColorStop(1,'#0d0825');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  [[28,18],[75,13],[140,37],[208,9],[285,28],[360,7],[425,23],[490,38],[55,58],[170,67],[330,53],[460,62],[95,95],[245,88],[400,78],[38,125],[155,115],[315,110],[475,100]].forEach(([x,y],i)=>{
    ctx.fillStyle=`rgba(255,255,220,${.5+.4*((i%3)/2)})`;ctx.fillRect(x,y,(i%3===0)?2:1,(i%3===0)?2:1);
  });
  ctx.fillStyle='rgba(255,250,200,.9)';ctx.beginPath();ctx.arc(415,38,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(3,0,16,.8)';ctx.beginPath();ctx.arc(422,33,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,180,255,.06)';ctx.beginPath();ctx.ellipse(240,65,180,28,-.3,0,Math.PI*2);ctx.fill();
  px(ctx,0,140,W,60,'#2a2035');px(ctx,0,138,W,5,'#3a3045');
  px(ctx,110,146,240,18,'#4a2060');px(ctx,110,146,240,5,'#6b3080');
  drawCharacter(ctx,'pranjal',130,112);
  drawCharacter(ctx,'fareeza',295,112);
}

function drawIIT(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a1628');g.addColorStop(1,'#152035');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  px(ctx,0,110,W,90,'#0d2d4a');
  ctx.fillStyle='rgba(100,180,255,.1)';ctx.beginPath();ctx.ellipse(224,132,130,18,0,0,Math.PI*2);ctx.fill();
  [[90,122],[165,132],[285,128],[390,134],[460,122]].forEach(([x,y])=>{ctx.fillStyle='rgba(255,255,200,.15)';ctx.fillRect(x,y,35,2);});
  px(ctx,0,96,W,20,'#2a3a20');px(ctx,170,96,108,20,'#c8a86c');
  [[55,35],[120,25],[400,30],[460,40]].forEach(([x,y])=>{
    ctx.fillStyle='#1a4a1a';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-22,y+52);ctx.lineTo(x+22,y+52);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2d6b1a';ctx.beginPath();ctx.moveTo(x,y+8);ctx.lineTo(x-17,y+57);ctx.lineTo(x+17,y+57);ctx.closePath();ctx.fill();
    px(ctx,x-4,y+52,8,35,'#6b4226');
  });
  px(ctx,195,18,110,78,'#1a2840');px(ctx,190,13,120,10,'#2a3850');
  for(let i=0;i<3;i++)for(let j=0;j<2;j++){ctx.fillStyle='rgba(255,220,100,.6)';ctx.fillRect(203+i*34,24+j*26,20,18);}
  drawCharacter(ctx,'pranjal',105,62);
  drawCharacter(ctx,'fareeza',320,62);
}
